<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiku 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════
           CSS DESIGN SYSTEM — CHIKU CHATBOT
           Theme: Deep-Space Glassmorphism
           ══════════════════════════════════════════ */
        :root {
            --bg:           #07080f;
            --surface:      rgba(255,255,255,0.04);
            --glass:        rgba(255,255,255,0.065);
            --border:       rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
            --accent:       #ff3c78;
            --accent-2:     #ff6e40;
            --blue:         #4facfe;
            --green:        #4ade80;
            --text:         #edeef2;
            --sub:          rgba(255,255,255,0.38);
            --user-grad:    linear-gradient(140deg, #ff3c78 0%, #ff6e40 100%);
            --radius-lg:    20px;
            --radius-sm:    12px;
        }

        *, *::before, *::after {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%; height: -webkit-fill-available;
        }

        body {
            height: 100%; height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── ANIMATED MESH BACKGROUND ── */
        .bg-canvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(90px); opacity: 0;
            animation: orbIn 1.2s ease forwards;
        }
        .orb-1 {
            width: 55vmax; height: 55vmax;
            background: radial-gradient(circle at center, rgba(255,60,120,0.18), transparent 65%);
            top: -20%; left: -15%;
            animation-delay: 0.2s;
            animation: orbIn 1.2s 0.2s ease forwards, orbFloat1 18s 1.4s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 45vmax; height: 45vmax;
            background: radial-gradient(circle at center, rgba(123,76,255,0.13), transparent 65%);
            bottom: -15%; right: -10%;
            animation: orbIn 1.2s 0.5s ease forwards, orbFloat2 22s 1.7s ease-in-out infinite alternate;
        }
        .orb-3 {
            width: 35vmax; height: 35vmax;
            background: radial-gradient(circle at center, rgba(255,110,64,0.10), transparent 65%);
            top: 40%; left: 35%;
            animation: orbIn 1.2s 0.8s ease forwards, orbFloat3 16s 2s ease-in-out infinite alternate;
        }
        @keyframes orbIn { to { opacity: 1; } }
        @keyframes orbFloat1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8%, 12%) scale(1.08); }
        }
        @keyframes orbFloat2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-10%, -8%) scale(1.06); }
        }
        @keyframes orbFloat3 {
            0%   { transform: translate(0, 0) scale(0.9); }
            100% { transform: translate(-5%, 8%) scale(1.1); }
        }

        /* ── APP LAYOUT ── */
        #app {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100%; height: -webkit-fill-available;
            max-width: 480px; margin: 0 auto;
        }

        /* ── LOADING SCREEN ── */
        #splash {
            position: absolute; inset: 0; z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            background: var(--bg);
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .splash-logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem; font-weight: 800;
            background: var(--user-grad);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .splash-sub { font-size: 0.8rem; color: var(--sub); }
        .spinner {
            width: 28px; height: 28px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── HEADER ── */
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: rgba(7,8,15,0.75);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--user-grad);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 0 0 2.5px rgba(255,60,120,0.25), 0 0 20px rgba(255,60,120,0.2);
        }
        .header-info { flex: 1; min-width: 0; }
        .header-name {
            font-family: 'Syne', sans-serif;
            font-size: 0.97rem; font-weight: 700;
        }
        .online-status {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.68rem; color: var(--green);
        }
        .pulse-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            animation: pulseDot 2.2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }
        .idx-badge {
            font-size: 0.62rem; padding: 3px 9px; border-radius: 20px;
            background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2);
            color: var(--green); font-weight: 500;
            transition: opacity 0.3s;
            white-space: nowrap;
        }
        .idx-badge.loading {
            background: rgba(255,255,255,0.05);
            border-color: var(--border); color: var(--sub);
        }

        /* ── CHAT AREA ── */
        #chat {
            flex: 1; overflow-y: auto;
            padding: 14px 12px;
            display: flex; flex-direction: column; gap: 2px;
            overscroll-behavior: contain;
        }
        #chat::-webkit-scrollbar { display: none; }

        /* ── MESSAGE ROWS ── */
        .msg-row {
            display: flex; flex-direction: column;
            max-width: 76%;
            opacity: 0; transform: translateY(10px) scale(0.97);
            animation: msgReveal 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .msg-row.u { align-self: flex-end; align-items: flex-end; }
        .msg-row.g { align-self: flex-start; align-items: flex-start; }
        @keyframes msgReveal {
            to { opacity: 1; transform: none; }
        }

        /* Consecutive message grouping */
        .msg-row.u + .msg-row.u { margin-top: 3px; }
        .msg-row.g + .msg-row.g { margin-top: 3px; }
        .msg-row.u + .msg-row.g,
        .msg-row.g + .msg-row.u { margin-top: 10px; }

        .bubble {
            padding: 9px 13px; border-radius: var(--radius-lg);
            font-size: 0.89rem; line-height: 1.55;
            word-break: break-word; white-space: pre-wrap;
            position: relative; overflow: hidden;
        }

        /* User bubble — warm gradient */
        .msg-row.u .bubble {
            background: var(--user-grad);
            border-bottom-right-radius: 4px;
            color: #fff;
            box-shadow: 0 4px 22px rgba(255,60,120,0.22),
                        0 1px 4px rgba(255,60,120,0.15);
        }
        .msg-row.u .bubble::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Chiku bubble — glass */
        .msg-row.g .bubble {
            background: var(--glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
        }

        /* ── META (time + source tag) ── */
        .msg-meta {
            display: flex; align-items: center; gap: 5px;
            margin-top: 3px; padding: 0 3px;
        }
        .msg-time { font-size: 0.6rem; color: var(--sub); }
        .src-tag {
            font-size: 0.58rem; padding: 1.5px 6px; border-radius: 20px;
            font-weight: 600; letter-spacing: 0.4px;
        }
        .tag-local {
            background: rgba(74,222,128,0.12); color: var(--green);
            border: 1px solid rgba(74,222,128,0.22);
        }
        .tag-ai {
            background: rgba(79,172,254,0.12); color: var(--blue);
            border: 1px solid rgba(79,172,254,0.22);
        }

        /* ── DATE DIVIDER ── */
        .divider {
            align-self: center;
            font-size: 0.63rem; color: var(--sub);
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            padding: 3px 11px; border-radius: 20px;
            margin: 10px 0 6px;
        }

        /* ── TYPING INDICATOR ── */
        #typing-row {
            align-self: flex-start; max-width: 76%;
            display: none; margin-top: 4px;
        }
        #typing-row.show {
            display: block;
            animation: msgReveal 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .typing-bubble {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--glass);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 11px 15px; border-radius: var(--radius-lg);
            border-bottom-left-radius: 4px;
        }
        .tdot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--sub);
            animation: bounce 1.3s ease-in-out infinite;
        }
        .tdot:nth-child(2) { animation-delay: 0.18s; }
        .tdot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.45; }
            30%          { transform: translateY(-5px); opacity: 1; }
        }

        /* ── QUICK REPLIES ── */
        #qr-bar {
            display: flex; gap: 7px;
            padding: 8px 12px 0; overflow-x: auto; flex-shrink: 0;
        }
        #qr-bar::-webkit-scrollbar { display: none; }
        .qr-chip {
            flex-shrink: 0;
            padding: 5px 13px; border-radius: 20px;
            font-size: 0.73rem; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--glass); border: 1px solid var(--border);
            color: var(--text); cursor: pointer; white-space: nowrap;
            transition: background 0.18s, border-color 0.18s, transform 0.12s;
        }
        .qr-chip:active {
            transform: scale(0.93);
            background: rgba(255,60,120,0.14);
            border-color: rgba(255,60,120,0.3);
        }

        /* ── INPUT AREA ── */
        .input-wrap {
            padding: 8px 12px max(16px, env(safe-area-inset-bottom, 16px));
            background: rgba(7,8,15,0.82);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-row {
            display: flex; align-items: flex-end; gap: 10px;
            margin-top: 8px;
        }
        #msg-input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 22px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.88rem; line-height: 1.45;
            outline: none; resize: none;
            max-height: 110px;
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow-y: auto;
        }
        #msg-input::-webkit-scrollbar { display: none; }
        #msg-input::placeholder { color: var(--sub); }
        #msg-input:focus {
            border-color: rgba(255,60,120,0.38);
            box-shadow: 0 0 0 3px rgba(255,60,120,0.08);
        }
        #send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--user-grad);
            border: none; outline: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: 0 4px 18px rgba(255,60,120,0.28);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        #send-btn:active {
            transform: scale(0.9);
            box-shadow: 0 2px 10px rgba(255,60,120,0.2);
        }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #send-btn svg { width: 17px; height: 17px; fill: white; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(30,32,45,0.9); border: 1px solid var(--border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            color: var(--text); font-size: 0.75rem; padding: 7px 15px;
            border-radius: 20px; z-index: 100;
            opacity: 0; transition: all 0.3s;
            pointer-events: none; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- Animated background orbs -->
<div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div id="app">
    <!-- Loading splash -->
    <div id="splash">
        <div class="splash-logo">Chiku 💕</div>
        <div class="spinner"></div>
        <div class="splash-sub">Yaadein load ho rhi hain...</div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="avatar">CK</div>
        <div class="header-info">
            <div class="header-name">Chiku 💕</div>
            <div class="online-status">
                <span class="pulse-dot"></span>
                <span>Online</span>
            </div>
        </div>
        <div class="idx-badge loading" id="idx-badge">⏳ Loading…</div>
    </header>

    <!-- Messages -->
    <div id="chat">
        <div class="divider">Aaj 💕</div>
        <div id="typing-row">
            <div class="typing-bubble">
                <div class="tdot"></div>
                <div class="tdot"></div>
                <div class="tdot"></div>
            </div>
        </div>
    </div>

    <!-- Quick replies -->
    <div id="qr-bar"></div>

    <!-- Input area -->
    <div class="input-wrap">
        <div class="input-row">
            <textarea
                id="msg-input"
                rows="1"
                placeholder="Kuch bolo Chiku ko... 💬"
                maxlength="500"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
            ></textarea>
            <button id="send-btn" aria-label="Send">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<script>
/* ============================================================
   CHIKU CHATBOT — SMART ENGINE v3.0
   Fixes: Emoji matching, garbage filter, anti-repeat,
          intent-aware scoring, raised threshold
   ============================================================ */
'use strict';

// ────────────────────────────────────────────────────────────
// MODULE: STATE
// ────────────────────────────────────────────────────────────
const State = {
    dataset:      [],
    wordIndex:    new Map(),
    indexed:      false,
    isBusy:       false,
    memBuffer:    [],
    MAX_MEM:      5,

    // Anti-repetition system
    usedSet:      new Set(),   // Set of recently used dataset indices
    usedQueue:    [],          // FIFO queue for eviction
    MAX_USED:     25,          // Remember last 25 used responses

    // Context tracking
    lastChikuMsg: '',          // Prevent exact repeat of last reply
    lastUserIntent: null,      // Track emotional context
};

// ────────────────────────────────────────────────────────────
// MODULE: TEXT UTILITIES
// ────────────────────────────────────────────────────────────

// Strip emoji & unicode symbols before matching
// WHY: "Hii Chiku 💕" was matching wrong entry because 💕 
//      was treated as a word character in some normalizers.
function stripEmoji(str) {
    return str
        .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
        .replace(/[\u{2600}-\u{27BF}]/gu, '')
        .replace(/[\u{FE00}-\u{FEFF}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim();
}

// Intent detection — understands WHAT kind of message this is
// WHY: A greeting should match a greeting. A question should 
//      match a question. Without this, "Hii" matches random entries.
function detectIntent(text) {
    const t = text.toLowerCase().trim();
    const words = t.split(/\s+/);
    return {
        isGreeting:   /^(hii|hi|hlo|hello|hey|hiya|hiii|helo|hii chiku|hey chiku)/.test(t),
        isQuestion:   t.endsWith('?') || /^(kya|kyu|kyun|kaisa|kaisi|kese|kitna|kitni|kab|kahan|kon|bata na|suno|kis|kisne|kiska)/.test(t),
        isSad:        /\b(sad|ro|rona|dukhi|bura|takleef|dard|hurt|miss|akela|lonely|pareshan)\b/.test(t),
        isAngry:      /\b(gussa|angry|naraz|mat karo|chup|shut|ugh|ugh)\b/.test(t),
        isLove:       /\b(pyaar|love|miss|chahta|chahti|dil|heart|cute|sweet)\b/.test(t),
        isShortAck:   words.length <= 2 && /^(ok|okay|okk|hn|ha|hm|thik|theek|acha|aacha|hmm|haan|na|nhi|bas|done|fine)$/.test(words[0]),
        wordCount:    words.length,
    };
}

// Garbage response filter
// WHY: Dataset has low-quality entries like "??", ".", "❤" etc.
//      These should NEVER be returned as Chiku's reply.
function isGarbageResponse(text) {
    if (!text) return true;
    const t = stripEmoji(text).trim();
    if (t.length < 2) return true;                        // Too short
    if (/^[\?\.\!\*\-\_]+$/.test(t)) return true;        // Only punctuation: "??" ".." etc
    if (/^(hn|ha|hm|ok|na|bas|\.)$/i.test(t)) return true; // Single generic ack
    return false;
}

// ────────────────────────────────────────────────────────────
// MODULE: FUZZY ENGINE
// ────────────────────────────────────────────────────────────
const FuzzyEngine = (() => {
    const SH = {
        'kr':'kar','kro':'karo','krna':'karna','krte':'karte','krti':'karti',
        'rhi':'rahi','rha':'raha','rhe':'rahe','rho':'raho',
        'nhi':'nahi','ni':'nahi','nh':'nahi','nai':'nahi',
        'h':'hai','hn':'haan','ha':'haan','hm':'haan','haa':'haan',
        'aur':'aur','or':'aur',
        'kyu':'kyun','kyuki':'kyunki',
        'yrr':'yaar','yr':'yaar',
        'bhi':'bhi','bi':'bhi',
        'me':'mein','mai':'mein',
        'pr':'par','pe':'par',
        'to':'toh',
        'bss':'bas','bs':'bas',
        'plz':'please','pls':'please',
        'thk':'thik','theek':'thik',
        'bc':'bakchod',
        'sch':'sach',
        'bta':'bata','bto':'batao',
        'sun':'suno','sn':'suno',
        'dikha':'dikha','dikh':'dikho',
        'aja':'aaja',
        'kal':'kal','aaj':'aaj','ab':'ab','abhi':'abhi',
        'ghr':'ghar','grh':'ghar',
        'kha':'khana','khaya':'khaya',
        'lrki':'ladki','lrka':'ladka',
    };

    function norm(text) {
        return stripEmoji(text)
            .toLowerCase()
            .replace(/[^\w\s]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim()
            .split(' ')
            .map(w => SH[w] ?? w)
            .join(' ');
    }

    // Space-efficient Levenshtein — O(n) space
    function lev(a, b) {
        a = a.slice(0, 45); b = b.slice(0, 45);
        const m = a.length, n = b.length;
        if (!m) return n; if (!n) return m;
        if (Math.abs(m - n) > 14) return Math.max(m, n);
        const row = Array.from({ length: n + 1 }, (_, i) => i);
        for (let i = 1; i <= m; i++) {
            let prev = row[0]; row[0] = i;
            for (let j = 1; j <= n; j++) {
                const tmp = row[j];
                row[j] = a[i-1] === b[j-1] ? prev : 1 + Math.min(prev, row[j], row[j-1]);
                prev = tmp;
            }
        }
        return row[n];
    }

    function score(query, candidate) {
        const q = norm(query), c = norm(candidate);
        if (!q || !c) return 0;
        if (q === c) return 1.0;
        if (c.includes(q) || q.includes(c)) return 0.87;

        const qW = q.split(' ').filter(Boolean);
        const cW = new Set(c.split(' ').filter(Boolean));
        let hits = 0;
        for (const w of qW) if (cW.has(w)) hits++;
        const wordS = qW.length ? hits / Math.max(qW.length, cW.size) : 0;

        const d = lev(q, c);
        const levS = 1 - d / (Math.max(q.length, c.length) || 1);

        return wordS * 0.65 + levS * 0.35;
    }

    return { norm, score };
})();

// ────────────────────────────────────────────────────────────
// MODULE: INDEXER
// ────────────────────────────────────────────────────────────
function buildWordIndex(data) {
    const idx = new Map();
    data.forEach((item, i) => {
        const words = FuzzyEngine.norm(item.u).split(' ').filter(w => w.length > 1);
        for (const w of words) {
            if (!idx.has(w)) idx.set(w, []);
            idx.get(w).push(i);
        }
    });
    return idx;
}

// Returns { item, idx } pairs — idx needed for anti-repeat tracking
function getCandidates(query) {
    const words = FuzzyEngine.norm(query).split(' ').filter(w => w.length > 1);
    if (!words.length) return [];
    const hitMap = new Map();

    for (const w of words) {
        if (State.wordIndex.has(w)) {
            for (const i of State.wordIndex.get(w))
                hitMap.set(i, (hitMap.get(i) ?? 0) + 2);
        }
        for (const [key, indices] of State.wordIndex) {
            if (key !== w && (key.startsWith(w) || w.startsWith(key))) {
                for (const i of indices)
                    hitMap.set(i, (hitMap.get(i) ?? 0) + 1);
            }
        }
    }

    return [...hitMap.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 100)
        .map(([i]) => ({ item: State.dataset[i], idx: i }));
}

// Anti-repetition tracker
function markUsed(idx) {
    if (State.usedQueue.length >= State.MAX_USED) {
        const old = State.usedQueue.shift();
        State.usedSet.delete(old);
    }
    State.usedSet.add(idx);
    State.usedQueue.push(idx);
}

// ── SMART MATCH FUNCTION ────────────────────────────────────
// The brain of the chatbot. Three-layer filtering:
//   Layer 1: Garbage & repeat filter
//   Layer 2: Intent-aware threshold (greetings need less confidence)
//   Layer 3: Context boost (question→question, emotion→emotion)
function findMatch(query) {
    if (!State.indexed) return null;

    const clean = stripEmoji(query).trim();
    if (!clean || clean.length < 2) return null;

    const intent = detectIntent(clean);

    // Short acknowledgements ("Ok", "Hn") → always use API for context
    // WHY: "Ok" exists 500+ times in dataset with random responses —
    //      any match would be wrong without conversation context.
    if (intent.isShortAck && intent.wordCount === 1) return null;

    // Threshold is dynamic based on intent
    // - Greetings need lower confidence (fewer variations in dataset)
    // - Questions and emotional messages need high confidence
    const THRESHOLD = intent.isGreeting ? 0.55
                    : intent.isSad || intent.isLove ? 0.64
                    : 0.61;

    const candidates = getCandidates(clean);
    if (!candidates.length) return null;

    let best = null, top = THRESHOLD;

    for (const { item, idx } of candidates) {
        // Layer 1: Anti-repetition — skip recently used
        if (State.usedSet.has(idx)) continue;

        // Layer 1: No exact repeat of last reply
        if (item.g === State.lastChikuMsg) continue;

        // Layer 1: No garbage responses ("??", ".", single chars)
        if (isGarbageResponse(item.g)) continue;

        // Layer 2: Score the match
        let s = FuzzyEngine.score(clean, item.u);

        // Layer 3: Intent-based boosting
        const itemIntent = detectIntent(item.u);
        if (intent.isGreeting && itemIntent.isGreeting)   s += 0.10;
        if (intent.isQuestion && itemIntent.isQuestion)   s += 0.06;
        if (intent.isSad      && itemIntent.isSad)        s += 0.05;
        if (intent.isLove     && itemIntent.isLove)       s += 0.05;

        // Slight boost for similar message length (context similarity)
        const lenRatio = Math.min(clean.length, item.u.length) /
                         Math.max(clean.length, item.u.length, 1);
        s += lenRatio * 0.03;

        if (s > top) { top = s; best = { item, idx }; }
    }

    if (!best) return null;

    markUsed(best.idx);
    State.lastChikuMsg = best.item.g;
    State.lastUserIntent = intent;
    return best.item;
}

// ────────────────────────────────────────────────────────────
// MODULE: MEMORY BUFFER
// WHY: AI fallback needs conversation context. Sending the
//      last 5 pairs lets Gemini respond contextually — not
//      just to the last message in isolation.
// ────────────────────────────────────────────────────────────
function pushMemory(role, content) {
    State.memBuffer.push({ role, content });
    // Keep buffer trimmed: (MAX_MEM pairs × 2 roles) = 10 messages max
    if (State.memBuffer.length > State.MAX_MEM * 2)
        State.memBuffer = State.memBuffer.slice(-(State.MAX_MEM * 2));
}

// ────────────────────────────────────────────────────────────
// MODULE: API CLIENT
// WHY: Sends prompt + history to /api/ask (Vercel serverless).
//      AbortSignal provides client-side timeout.
// ────────────────────────────────────────────────────────────
async function apiAsk(prompt) {
    const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            prompt,
            history: State.memBuffer.slice(0, -1) // exclude the just-added user msg
        }),
        signal: AbortSignal.timeout(14000),
    });

    if (res.status === 429) throw new Error('RATE_LIMIT');
    if (!res.ok) throw new Error(`HTTP_${res.status}`);

    const data = await res.json();
    if (!data.reply) throw new Error('EMPTY_REPLY');
    return data.reply;
}

// ────────────────────────────────────────────────────────────
// MODULE: UI
// ────────────────────────────────────────────────────────────
const UI = (() => {
    const chatEl = document.getElementById('chat');
    const typingRow = document.getElementById('typing-row');

    const fmtTime = () =>
        new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

    const scrollBottom = () =>
        requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });

    function addMsg(text, side, source) {
        const row = document.createElement('div');
        row.className = `msg-row ${side}`;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;

        const meta = document.createElement('div');
        meta.className = 'msg-meta';

        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = fmtTime();
        meta.appendChild(time);

        if (source) {
            const tag = document.createElement('span');
            tag.className = `src-tag ${source === 'AI' ? 'tag-ai' : 'tag-local'}`;
            tag.textContent = source === 'AI' ? '✦ AI' : '◉ Local';
            meta.appendChild(tag);
        }

        row.appendChild(bubble);
        row.appendChild(meta);
        chatEl.insertBefore(row, typingRow);
        scrollBottom();
    }

    function showTyping(show) {
        typingRow.classList.toggle('show', show);
        if (show) scrollBottom();
    }

    function setSplash(visible) {
        document.getElementById('splash').classList.toggle('hidden', !visible);
    }

    return { addMsg, showTyping, setSplash, scrollBottom };
})();

// ────────────────────────────────────────────────────────────
// MODULE: TOAST
// ────────────────────────────────────────────────────────────
function showToast(msg, duration = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
}

// ────────────────────────────────────────────────────────────
// MODULE: QUICK REPLIES
// WHY: Real openers extracted from JSON give Chiku's vibe.
// ────────────────────────────────────────────────────────────
const QUICK_REPLIES = [
    'Hii Chiku 💕', 'Kya kr rhi ho?', 'Kese ho?',
    'Suno na yrr', 'Hup!', 'Aaj kya hua?',
    'Baat krni h', 'Miss krta hu'
];

function renderQuickReplies() {
    const bar = document.getElementById('qr-bar');
    QUICK_REPLIES.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'qr-chip';
        btn.textContent = text;
        btn.addEventListener('click', () => {
            const input = document.getElementById('msg-input');
            input.value = text;
            input.focus();
            autoResize(input);
        });
        bar.appendChild(btn);
    });
}

// ────────────────────────────────────────────────────────────
// MODULE: SEND HANDLER
// WHY: Implements the Local-First hybrid strategy:
//   1. Fuzzy search in local JSON (fast, private, on-device)
//   2. Fallback to API only if no good match found
// ────────────────────────────────────────────────────────────
const ERROR_REPLIES = [
    'Yrr net slow h mera 😅 thoda baad try karo',
    'Hup! Kuch gadbad ho gyi, dobara bolna 😬',
    'Server so gya shayad 😴 thodi der mein try karo',
    'Yrr signal nhi aa rha, baad mein bata 🙈',
];

async function handleSend() {
    if (State.isBusy) return;

    const input = document.getElementById('msg-input');
    const val = input.value.trim();
    if (!val) return;

    State.isBusy = true;
    input.value = '';
    autoResize(input);
    document.getElementById('send-btn').disabled = true;

    UI.addMsg(val, 'u', null);
    pushMemory('user', val);

    // ── STRATEGY 1: Local Fuzzy Match ──────────────────────
    if (State.indexed) {
        const match = findMatch(val);
        if (match) {
            UI.showTyping(true);
            // Natural typing delay (400–750ms)
            await sleep(420 + Math.random() * 330);
            UI.showTyping(false);
            UI.addMsg(match.g, 'g', 'Local');
            pushMemory('assistant', match.g);
            finalize();
            return;
        }
    }

    // ── STRATEGY 2: API Fallback ───────────────────────────
    UI.showTyping(true);
    try {
        const reply = await apiAsk(val);
        UI.showTyping(false);
        UI.addMsg(reply, 'g', 'AI');
        pushMemory('assistant', reply);
    } catch (err) {
        UI.showTyping(false);
        const msg = err.message === 'RATE_LIMIT'
            ? 'Yrr itna fast mat type karo 😂 thoda ruko'
            : ERROR_REPLIES[Math.floor(Math.random() * ERROR_REPLIES.length)];
        UI.addMsg(msg, 'g', null);
    }

    finalize();
}

function finalize() {
    State.isBusy = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ────────────────────────────────────────────────────────────
// MODULE: INPUT AUTO-RESIZE
// ────────────────────────────────────────────────────────────
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// ────────────────────────────────────────────────────────────
// EVENT LISTENERS
// ────────────────────────────────────────────────────────────
const inputEl = document.getElementById('msg-input');
inputEl.addEventListener('input', function() { autoResize(this); });
inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
document.getElementById('send-btn').addEventListener('click', handleSend);

// ────────────────────────────────────────────────────────────
// MODULE: INIT
// ────────────────────────────────────────────────────────────
async function init() {
    renderQuickReplies();

    // Load dataset
    try {
        const res = await fetch('chats_from_html.json');
        if (!res.ok) throw new Error('Fetch failed');
        State.dataset = await res.json();
    } catch (e) {
        console.warn('[Chiku] Local dataset load failed:', e);
    }

    UI.setSplash(false);

    // Build inverted index in idle time (non-blocking)
    // WHY: requestIdleCallback ensures the UI is fully responsive
    //      before we run the expensive indexing loop.
    const buildIdx = () => {
        const badge = document.getElementById('idx-badge');
        State.wordIndex = buildWordIndex(State.dataset);
        State.indexed = true;
        badge.textContent = `◉ ${State.dataset.length.toLocaleString()} Yaadein`;
        badge.classList.remove('loading');
        showToast(`✓ ${State.dataset.length.toLocaleString()} local memories ready 💾`);
    };

    if ('requestIdleCallback' in window) {
        requestIdleCallback(buildIdx, { timeout: 3000 });
    } else {
        setTimeout(buildIdx, 600);
    }

    // Initial greeting
    await sleep(650);
    UI.addMsg('Hii Shiva! 🌸 Kya chal rha h aaj?', 'g', null);
}

init();
</script>
