<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shanu AI 💬</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="profile">
      <div class="avatar">🦋</div>
      <div>
        <h2>Miss P.</h2>
        <span class="status">Online</span>
      </div>
    </div>
  </header>

  <!-- CHAT AREA -->
  <main id="chat-container">

    <!-- Example Messages (will be dynamic) -->

    <!-- User Message -->
    <div class="message user">
      <div class="bubble">Hello</div>
    </div>

    <!-- AI Message -->
    <div class="message ai">
      <div class="bubble">Hn bolo 😒</div>
    </div>

  </main>

  <!-- TYPING INDICATOR -->
  <div id="typing" class="typing hidden">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- INPUT AREA -->
  <footer class="input-area">
    <input 
      type="text" 
      id="user-input" 
      placeholder="Type a message..." 
      autocomplete="off"
    >
    <button id="send-btn">Send</button>
  </footer>

  <!-- SCRIPTS -->
  <script src="dataset.json" type="application/json" id="dataset"></script>
  <script src="script.js"></script>

</body>
</html>
